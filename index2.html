<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Juego Snake con Sonidos</title>
    <style>
      body {
        background-color: #1e1e2e;
        color: #ffffff;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }

      h1 {
        margin-bottom: 5px;
      }

      #score-board {
        font-size: 1.2rem;
        margin-bottom: 10px;
      }

      #start-btn {
        background-color: #4caf50;
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 1.1rem;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        margin-bottom: 15px;
        box-shadow: 0 4px 10px rgba(76, 175, 80, 0.4);
        transition:
          transform 0.1s,
          background-color 0.2s;
      }

      #start-btn:hover {
        background-color: #45a049;
        transform: scale(1.05);
      }

      /* Tablero estilizado */
      canvas {
        border: 4px solid #ffffff;
        background-color: #2b2b3d;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body>
    <h1>Programa tu Snake 🐍</h1>
    <div id="score-board">Puntaje: <span id="score">0</span></div>
    <button id="start-btn" onclick="startGame()">▶ Jugar</button>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const scoreElement = document.getElementById("score");
      const startBtn = document.getElementById("start-btn");

      // --- SISTEMA DE AUDIO (Web Audio API) ---
      let audioCtx = null;
      let musicInterval = null;

      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
      }

      // 1. 🍎 Sonido de comer manzana (Tono Agudo Alegre)
      function playEatSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine";
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(
          880,
          audioCtx.currentTime + 0.1,
        );

        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(
          0.01,
          audioCtx.currentTime + 0.1,
        );

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      }

      // 2. 💀 Sonido de perder (Melodía Descendente)
      function playGameOverSound() {
        if (!audioCtx) return;
        const notes = [300, 260, 220, 150]; // Notas que van bajando
        notes.forEach((freq, index) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();

          osc.type = "sawtooth"; // Sonido un poco más raspado/arcade
          osc.frequency.setValueAtTime(
            freq,
            audioCtx.currentTime + index * 0.12,
          );

          gain.gain.setValueAtTime(0.2, audioCtx.currentTime + index * 0.12);
          gain.gain.exponentialRampToValueAtTime(
            0.01,
            audioCtx.currentTime + (index + 1) * 0.12,
          );

          osc.connect(gain);
          gain.connect(audioCtx.destination);

          osc.start(audioCtx.currentTime + index * 0.12);
          osc.stop(audioCtx.currentTime + (index + 1) * 0.12);
        });
      }

      // 3. 🎵 Música de fondo alegre y pegajosa estilo 8-Bits
      const musicNotes = [
        261.63, 329.63, 392.0, 523.25, 392.0, 329.63, 293.66, 349.23,
      ];
      let noteIndex = 0;

      function startBackgroundMusic() {
        if (musicInterval) clearInterval(musicInterval);

        musicInterval = setInterval(() => {
          if (!audioCtx || gameRunning === false) return;

          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();

          osc.type = "triangle"; // Tono suave para la música
          osc.frequency.setValueAtTime(
            musicNotes[noteIndex],
            audioCtx.currentTime,
          );

          gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(
            0.001,
            audioCtx.currentTime + 0.15,
          );

          osc.connect(gain);
          gain.connect(audioCtx.destination);

          osc.start();
          osc.stop(audioCtx.currentTime + 0.15);

          noteIndex = (noteIndex + 1) % musicNotes.length;
        }, 180);
      }

      function stopBackgroundMusic() {
        if (musicInterval) clearInterval(musicInterval);
      }

      // --- CONFIGURACIÓN Y LÓGICA DEL JUEGO ---
      const gridSize = 20;
      const tileCount = canvas.width / gridSize;

      let snake = [];
      let food = { x: 5, y: 5 };
      let dx = 0;
      let dy = -1;
      let score = 0;
      let gameRunning = false;

      function startGame() {
        initAudio();
        startBtn.style.display = "none";
        resetGame();
        gameRunning = true;
        startBackgroundMusic();
        main();
      }

      function main() {
        if (hasGameEnded()) {
          stopBackgroundMusic();
          playGameOverSound(); // 🔊 Efecto de perder

          setTimeout(() => {
            alert("¡Game Over! Te mordiste la cola. Tu puntaje fue: " + score);
            startBtn.textContent = "🔄 Volver a Jugar";
            startBtn.style.display = "inline-block";
            gameRunning = false;
          }, 500);
          return;
        }

        setTimeout(function onTick() {
          clearCanvas();
          drawFood();
          moveSnake();
          drawSnake();
          if (gameRunning) main();
        }, 100);
      }

      function clearCanvas() {
        ctx.fillStyle = "#2b2b3d";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      function drawSnake() {
        snake.forEach((part, index) => {
          ctx.fillStyle = index === 0 ? "#4fc3f7" : "#0288d1";
          ctx.fillRect(
            part.x * gridSize,
            part.y * gridSize,
            gridSize - 2,
            gridSize - 2,
          );
        });
      }

      function drawFood() {
        ctx.fillStyle = "#ff5252";
        ctx.fillRect(
          food.x * gridSize,
          food.y * gridSize,
          gridSize - 2,
          gridSize - 2,
        );
      }

      function moveSnake() {
        let newX = snake[0].x + dx;
        let newY = snake[0].y + dy;

        // Traspaso de paredes infinitas
        if (newX < 0) newX = tileCount - 1;
        if (newX >= tileCount) newX = 0;
        if (newY < 0) newY = tileCount - 1;
        if (newY >= tileCount) newY = 0;

        const head = { x: newX, y: newY };
        snake.unshift(head);

        // Si come la manzana
        if (head.x === food.x && head.y === food.y) {
          score += 10;
          scoreElement.textContent = score;
          playEatSound(); // 🔊 Sonido de comer
          generateFood();
        } else {
          snake.pop();
        }
      }

      function hasGameEnded() {
        for (let i = 4; i < snake.length; i++) {
          if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
            return true;
          }
        }
        return false;
      }

      function generateFood() {
        food.x = Math.floor(Math.random() * tileCount);
        food.y = Math.floor(Math.random() * tileCount);
      }

      function resetGame() {
        snake = [
          { x: 10, y: 10 },
          { x: 10, y: 11 },
          { x: 10, y: 12 },
        ];
        dx = 0;
        dy = -1;
        score = 0;
        scoreElement.textContent = score;
      }

      // Controles del teclado
      document.addEventListener("keydown", changeDirection);

      function changeDirection(event) {
        const KEY_LEFT = 37;
        const KEY_UP = 38;
        const KEY_RIGHT = 39;
        const KEY_DOWN = 40;

        const keyPressed = event.keyCode;
        const goingUp = dy === -1;
        const goingDown = dy === 1;
        const goingRight = dx === 1;
        const goingLeft = dx === -1;

        if (keyPressed === KEY_LEFT && !goingRight) {
          dx = -1;
          dy = 0;
        }
        if (keyPressed === KEY_UP && !goingDown) {
          dx = 0;
          dy = -1;
        }
        if (keyPressed === KEY_RIGHT && !goingLeft) {
          dx = 1;
          dy = 0;
        }
        if (keyPressed === KEY_DOWN && !goingUp) {
          dx = 0;
          dy = 1;
        }
      }

      // Dibujar pantalla inicial
      clearCanvas();
    </script>
  </body>
</html>
