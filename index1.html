<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Juego Snake</title>
    <style>
      body {
        background-color: #1e1e2e;
        color: #ffffff;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }

      h1 {
        margin-bottom: 5px;
      }

      #score-board {
        font-size: 1.2rem;
        margin-bottom: 15px;
      }

      /* tablero estilizado */
      canvas {
        border: 4px solid #ffffff;
        background-color: #2b2b3d;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body>
    <h1>Programa tu Snake</h1>
    <div id="score-board">Puntaje: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const scoreElement = document.getElementById("score");

      // Tamaño de cada celda de la cuadrícula
      const gridSize = 20;
      const tileCount = canvas.width / gridSize;

      // Estado inicial de la Culebra
      let snake = [
        { x: 10, y: 10 },
        { x: 10, y: 11 },
        { x: 10, y: 12 },
      ];

      // Posición inicial de la manzana
      let food = { x: 5, y: 5 };

      // Velocidad inicial
      let dx = 0;
      let dy = -1;

      let score = 0;

      // Bucle principal del juego (se ejecuta cada 100ms)
      function main() {
        if (hasGameEnded()) {
          alert("¡Game Over! Te mordiste la cola. Tu puntaje fue: " + score);
          resetGame();
          return;
        }

        setTimeout(function onTick() {
          clearCanvas();
          drawFood();
          moveSnake();
          drawSnake();
          main();
        }, 100);
      }

      // Fondo del tablero
      function clearCanvas() {
        ctx.fillStyle = "#2b2b3d";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      // Dibujar la culebra (bloques azulosos/celestes)
      function drawSnake() {
        snake.forEach((part, index) => {
          // La cabeza un poco más clara
          ctx.fillStyle = index === 0 ? "#4fc3f7" : "#0288d1";
          ctx.fillRect(
            part.x * gridSize,
            part.y * gridSize,
            gridSize - 2,
            gridSize - 2,
          );
        });
      }

      // Dibujar la manzana (roja)
      function drawFood() {
        ctx.fillStyle = "#ff5252";
        ctx.fillRect(
          food.x * gridSize,
          food.y * gridSize,
          gridSize - 2,
          gridSize - 2,
        );
      }

      // Movimiento y lógica de bordes infinitos
      function moveSnake() {
        // Nueva posición calculada
        let newX = snake[0].x + dx;
        let newY = snake[0].y + dy;

        // --- TRASPASO DE PAREDES ---
        if (newX < 0) newX = tileCount - 1; // Si sale por la izquierda -> entra por la derecha
        if (newX >= tileCount) newX = 0; // Si sale por la derecha -> entra por la izquierda
        if (newY < 0) newY = tileCount - 1; // Si sale por arriba -> entra por abajo
        if (newY >= tileCount) newY = 0; // Si sale por abajo -> entra por arriba

        const head = { x: newX, y: newY };
        snake.unshift(head);

        // Si come la manzana
        if (head.x === food.x && head.y === food.y) {
          score += 10;
          scoreElement.textContent = score;
          generateFood();
        } else {
          snake.pop(); // Si no comió, mantenemos la longitud quitando la cola
        }
      }

      // Comprobar si chocó consigo misma
      function hasGameEnded() {
        for (let i = 4; i < snake.length; i++) {
          if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
            return true;
          }
        }
        return false;
      }

      // Generar manzana en un lugar aleatorio
      function generateFood() {
        food.x = Math.floor(Math.random() * tileCount);
        food.y = Math.floor(Math.random() * tileCount);
      }

      // Reiniciar juego
      function resetGame() {
        snake = [
          { x: 10, y: 10 },
          { x: 10, y: 11 },
          { x: 10, y: 12 },
        ];
        dx = 0;
        dy = -1;
        score = 0;
        scoreElement.textContent = score;
        main();
      }

      // Controles del Teclado
      document.addEventListener("keydown", changeDirection);

      function changeDirection(event) {
        const KEY_LEFT = 37;
        const KEY_UP = 38;
        const KEY_RIGHT = 39;
        const KEY_DOWN = 40;

        const keyPressed = event.keyCode;
        const goingUp = dy === -1;
        const goingDown = dy === 1;
        const goingRight = dx === 1;
        const goingLeft = dx === -1;

        // Evitamos que la culebra gire 180° hacia su propio cuerpo
        if (keyPressed === KEY_LEFT && !goingRight) {
          dx = -1;
          dy = 0;
        }
        if (keyPressed === KEY_UP && !goingDown) {
          dx = 0;
          dy = -1;
        }
        if (keyPressed === KEY_RIGHT && !goingLeft) {
          dx = 1;
          dy = 0;
        }
        if (keyPressed === KEY_DOWN && !goingUp) {
          dx = 0;
          dy = 1;
        }
      }

      // Arrancar el juego
      main();
    </script>
  </body>
</html>
